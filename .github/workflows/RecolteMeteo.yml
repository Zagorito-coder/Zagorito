name: RecolteMeteoQuotidienne

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'   # 4x/jour : 00h, 06h, 12h, 18h UTC (donnees fraiches toutes les 6h)
  workflow_dispatch:       # bouton "Run workflow" manuel dans GitHub

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code du depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-harvest.txt

      - name: Installer les dependances
        run: pip install --disable-pip-version-check -r requirements-harvest.txt

      - name: Recreer la cle Firebase depuis le secret GitHub
        shell: bash
        env:
          FIREBASE_KEY_JSON: ${{ secrets.FIREBASE_KEY_JSON }}
        run: |
          umask 077
          printf '%s' "$FIREBASE_KEY_JSON" > firebase-key.json

      - name: Executer le script de recolte
        env:
          OPEN_METEO_API_KEY: ${{ secrets.OPEN_METEO_API_KEY }}
        run: python harvest_forecast.py

      - name: Nettoyer la cle (securite)
        if: always()
        run: rm -f firebase-key.json
