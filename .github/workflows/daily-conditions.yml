name: Daily fishing conditions

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

jobs:
  update-conditions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Installation des dépendances
        working-directory: functions
        run: npm ci

      - name: Vérification du secret Open-Meteo commercial
        env:
          OPEN_METEO_API_KEY: ${{ secrets.OPEN_METEO_API_KEY }}
        run: |
          if [ -z "${OPEN_METEO_API_KEY//[[:space:]]/}" ]; then
            echo "::error::Le secret OPEN_METEO_API_KEY est obligatoire pour l'API commerciale."
            exit 1
          fi

      - name: Récupération des conditions et écriture dans Firestore
        working-directory: functions
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          OPEN_METEO_API_KEY: ${{ secrets.OPEN_METEO_API_KEY }}
        run: node run-once.js
