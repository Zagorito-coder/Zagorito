# Configuration de flutter_launcher_icons
# Lancer : flutter pub get && flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/launcher_icon.png"
    background_color: "#0A3748"
    theme_color: "#1DBCB8"
  image_path: "assets/launcher_icon.png"
  adaptive_icon_background: "#0A3748"
  adaptive_icon_foreground: "assets/launcher_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
