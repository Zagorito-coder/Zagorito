name: spots_app
description: Application de spots de pêche côtière
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2
  flutter_map: ^6.1.0
  path_provider: ^2.1.2
  geolocator: ^12.0.0
  latlong2: ^0.9.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.5
  http: ^1.2.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/spots.csv
    - assets/shops.csv
    - assets/peche_cotiere_database.csv
    - assets/peche_Montagestechnique_database.csv
    - assets/logo.png
    - assets/lang/fr.json
    - assets/lang/en.json
    - assets/lang/ar.json
