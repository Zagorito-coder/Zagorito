name: spots_app
description: Application de spots de pêche côtière
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2
  flutter_map: ^8.3.0
  path_provider: ^2.1.2
  geolocator: ^14.0.3
  latlong2: ^0.9.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.5
  http: ^1.2.0
  google_fonts: ^8.1.0
  dio: ^5.8.0
  flutter_map_tile_caching: ^10.1.1
  provider: ^6.1.5+1
  flutter_compass: ^0.8.1
  cached_network_image: ^3.4.1
  flutter_map_animations: ^0.10.0
  lottie: ^3.3.3
  encrypt: ^5.0.3
  crypto: ^3.0.0
  flutter_dotenv: ^6.0.1
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  google_sign_in: ^7.2.0
  flutter_secure_storage: ^10.3.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/spots.csv.enc
    - assets/shops.csv
    - assets/peche_cotiere_databaseAr.csv
    - assets/peche_cotiere_databaseEn.csv
    - assets/peche_cotiere_databaseFr.csv
    - assets/peche_Montagestechnique_databaseAr.csv
    - assets/peche_Montagestechnique_databaseEn.csv
    - assets/peche_Montagestechnique_databaseFr.csv
    - assets/peche_cotiere_databaseEs.csv
    - assets/peche_Montagestechnique_databaseEs.csv
    - assets/logo.png
    - assets/earth_splash.jpg
    - assets/fish_data.json
    - assets/images/
    - assets/images/techniques/
    - assets/Shopsimages/
    - assets/Shopsimages/mini tiles marqueurs/
    - assets/fish_images/
    - assets/animations/
    - assets/launcher_icon.png
    - assets/lang/fr.json
    - assets/lang/en.json
    - assets/lang/ar.json
    - assets/lang/es.json

